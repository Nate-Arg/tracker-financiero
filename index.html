    .app{max-width:430px;margin:0 auto;background:#f2f2f7;min-height:100vh;padding-bottom:80px}
    .header{background:#fff;border-bottom:0.5px solid rgba(0,0,0,.12);padding:16px;position:sticky;top:0;z-index:10}

    .header p{font-size:12px;color:#6d6d72;margin-top:2px}
    .tabs{display:flex;background:#fff;border-bottom:0.5px solid rgba(0,0,0,.12);position:sticky;top:57px;z-index:9}
    .tab{flex:1;padding:10px 4px;font-size:12px;font-weight:500;text-align:center;color:#6d6d72;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
    .tab.active{color:#1c1c1e;border-bottom-color:#3266ad}
    .page{display:none;padding:12px}
    .page.active{display:block}
    .metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    .metric{background:#fff;border-radius:12px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .metric-label{font-size:11px;color:#6d6d72;margin-bottom:4px}
    .metric-value{font-size:18px;font-weight:600;color:#1c1c1e}
    .metric-value.danger{color:#c0392b}
    .metric-value.success{color:#1d7a4f}
    .card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .card-title{font-size:13px;font-weight:600;color:#1c1c1e;margin-bottom:10px}
    .ingreso-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:12px;border-bottom:0.5px solid rgba(0,0,0,.08)}
    .ingreso-label{font-size:12px;color:#6d6d72;flex-shrink:0}
    .ingreso-val{font-size:15px;font-weight:600;flex:1}
    .ingreso-btn{font-size:11px;color:#3266ad;cursor:pointer;border:0.5px solid #b5d4f4;border-radius:6px;padding:3px 8px;background:none;white-space:nowrap}
    .ingreso-edit{display:none;margin-bottom:12px;padding-bottom:12px;border-bottom:0.5px solid rgba(0,0,0,.08);gap:6px;align-items:center}
    .ingreso-edit.show{display:flex}
    .ingreso-edit input{flex:1;padding:8px 10px;font-size:13px;border:0.5px solid rgba(0,0,0,.15);border-radius:10px;background:#fff;color:#1c1c1e}
    .ingreso-edit button{padding:8px 12px;background:#3266ad;color:#fff;border:none;border-radius:10px;font-size:12px;cursor:pointer}
    .cat-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .cat-label{font-size:12px;color:#6d6d72;width:120px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cat-bar-wrap{flex:1;height:6px;background:#f2f2f7;border-radius:3px;overflow:hidden}
    .cat-bar{height:100%;border-radius:3px;transition:width .4s}
    .cat-amount{font-size:11px;color:#6d6d72;width:72px;text-align:right;flex-shrink:0}
    .expense-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid rgba(0,0,0,.08)}
    .expense-item:last-child{border-bottom:none}
    .exp-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .exp-info{flex:1;min-width:0}
    .exp-name{font-size:13px;color:#1c1c1e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .exp-cat{font-size:11px;color:#6d6d72}
    .exp-amount{font-size:13px;font-weight:600;color:#1c1c1e}
    .exp-date{font-size:10px;color:#6d6d72}
    .month-selector{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .month-btn{background:#fff;border:0.5px solid rgba(0,0,0,.12);border-radius:10px;padding:6px 16px;font-size:18px;cursor:pointer;color:#1c1c1e;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .month-label{font-size:14px;font-weight:600;color:#1c1c1e}

    .deuda-nombre{font-size:13px;font-weight:600;color:#1c1c1e;flex:1;margin-right:8px}
    .badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;flex-shrink:0}
    .badge-ok{background:#e1f5ee;color:#0f6e56}
    .badge-pend{background:#faeeda;color:#854f0b}
    .deuda-progress-bar{height:5px;background:#f2f2f7;border-radius:3px;overflow:hidden;margin-bottom:8px}
    .deuda-progress-fill{height:100%;border-radius:3px;background:#3266ad;transition:width .4s}
    .deuda-nums{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
    .deuda-num{text-align:center}
    .deuda-num-label{font-size:10px;color:#6d6d72;margin-bottom:2px}
    .deuda-num-val{font-size:12px;font-weight:600;color:#1c1c1e}
    .deuda-num-val.r{color:#c0392b}
    .deuda-num-val.g{color:#1d7a4f}
    .pago-row{display:flex;gap:6px;align-items:center;border-top:0.5px solid rgba(0,0,0,.08);padding-top:10px}
    .pago-row input{flex:1;padding:9px 10px;font-size:14px;border:0.5px solid rgba(0,0,0,.15);border-radius:10px;background:#fff;color:#1c1c1e}
    .pago-row button{padding:9px 14px;background:#3266ad;color:#fff;border:none;border-radius:10px;font-size:13px;cursor:pointer;white-space:nowrap;font-weight:500}
    .add-deuda-btn{width:100%;padding:12px;background:none;border:0.5px dashed rgba(0,0,0,.2);border-radius:14px;font-size:13px;color:#6d6d72;cursor:pointer;margin-top:4px}
    .fondo-bar{height:8px;background:#f2f2f7;border-radius:4px;overflow:hidden;margin-top:4px}
    .fondo-fill{height:100%;border-radius:4px}
    .add-btn{position:fixed;bottom:90px;right:20px;width:54px;height:54px;border-radius:50%;background:#3266ad;color:#fff;font-size:26px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(50,102,173,.4);z-index:20}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:30;align-items:flex-end;justify-content:center}

    .modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:20px;max-height:85vh;overflow-y:auto;padding-bottom:40px}
    .modal h2{font-size:17px;font-weight:600;margin-bottom:16px}
    .form-group{margin-bottom:12px}
    .form-group label{font-size:12px;color:#6d6d72;display:block;margin-bottom:4px;font-weight:500}
    .form-group input,.form-group select{width:100%;padding:12px;font-size:15px;border:0.5px solid rgba(0,0,0,.15);border-radius:12px;background:#f9f9f9;color:#1c1c1e;appearance:none}
    .btn-primary{width:100%;padding:14px;background:#3266ad;color:#fff;border:none;border-radius:14px;font-size:15px;cursor:pointer;margin-top:8px;font-weight:600}
    .btn-cancel{width:100%;padding:12px;background:none;border:0.5px solid rgba(0,0,0,.15);border-radius:14px;font-size:15px;cursor:pointer;color:#6d6d72;margin-top:6px}
    .chart-wrap{position:relative;width:100%;height:180px;margin-bottom:4px}
    .safe-bottom{height:env(safe-area-inset-bottom)}
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Tracker Financiero</h1>
    <p id="header-sub"></p>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="showPage('resumen',this)">Resumen</div>
    <div class="tab" onclick="showPage('gastos',this)">Gastos</div>
    <div class="tab" onclick="showPage('deudas',this)">Deudas</div>
    <div class="tab" onclick="showPage('fondo',this)">Fondo</div>
  </div>

  <!-- RESUMEN -->
  <div id="page-resumen" class="page active">
    <div class="month-selector">
      <button class="month-btn" onclick="prevMes()">&#8249;</button>
      <span class="month-label" id="mes-label">...</span>
      <button class="month-btn" onclick="nextMes()">&#8250;</button>
    </div>
    <div class="metric-grid" id="metrics"></div>
    <div class="card">
      <div class="ingreso-row">
        <span class="ingreso-label">Ingreso del mes</span>
        <span class="ingreso-val" id="ingreso-val">—</span>
        <button class="ingreso-btn" onclick="toggleEdit()">Editar</button>
      </div>
      <div class="ingreso-edit" id="ingreso-edit">
        <input type="number" id="inp-ingreso" placeholder="Ej: 5500000" inputmode="numeric">
        <button onclick="guardarIngreso()">Guardar</button>
      </div>
      <div class="card-title">Por categoría</div>
      <div id="cat-bars"></div>
    </div>
    <div class="card">
      <div class="card-title">Evolución mensual (ARS)</div>
      <div class="chart-wrap"><canvas id="chartMes"></canvas></div>
    </div>
  </div>

  <!-- GASTOS -->
  <div id="page-gastos" class="page">
    <div class="month-selector">
      <button class="month-btn" onclick="prevMes2()">&#8249;</button>
      <span class="month-label" id="mes-label2">...</span>
      <button class="month-btn" onclick="nextMes2()">&#8250;</button>
    </div>
    <div id="filtro-cat" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px"></div>
    <div class="card" id="expense-list"></div>
  </div>

  <!-- DEUDAS -->
  <div id="page-deudas" class="page">
    <div class="metric-grid" id="deudas-metrics"></div>
    <div id="deudas-list"></div>
    <button class="add-deuda-btn" onclick="openDeudaModal()">+ Agregar deuda</button>
  </div>

  <!-- FONDO -->
  <div id="page-fondo" class="page">
    <div class="metric" style="margin-bottom:10px"><div class="metric-label">Total acumulado</div><div class="metric-value success" id="fondo-total">-</div></div>
    <div class="card"><div class="card-title">Ahorros por mes</div><div id="fondo-list"></div></div>
  </div>
</div>

<button class="add-btn" id="fab" onclick="openGastoModal()">+</button>

<!-- MODAL GASTO -->
<div class="modal-overlay" id="modal-gasto" onclick="if(event.target===this)closeModal('modal-gasto')">
  <div class="modal">
    <h2>Nuevo gasto</h2>
    <div class="form-group"><label>Descripción</label><input type="text" id="inp-nombre" placeholder="Ej: Supermercado"></div>
    <div class="form-group"><label>Monto (ARS)</label><input type="number" id="inp-monto" placeholder="0" inputmode="numeric"></div>
    <div class="form-group"><label>Fecha</label><input type="date" id="inp-fecha"></div>
    <div class="form-group"><label>Categoría</label>
      <select id="inp-cat">
        <option>Alimentos</option><option>Pagos mensuales</option><option>Servicios</option>
        <option>Vehiculo</option><option>Educacion</option><option>Recreacion</option>
        <option>Gastos Extraordinarios</option><option>Reparaciones de Casa</option><option>Gastos discrecionales</option>
      </select>
    </div>
    <button class="btn-primary" onclick="addGasto()">Guardar gasto</button>
    <button class="btn-cancel" onclick="closeModal('modal-gasto')">Cancelar</button>
    <div class="safe-bottom"></div>
  </div>
</div>

<!-- MODAL DEUDA -->
<div class="modal-overlay" id="modal-deuda" onclick="if(event.target===this)closeModal('modal-deuda')">
  <div class="modal">
    <h2>Nueva deuda</h2>
    <div class="form-group"><label>Nombre</label><input type="text" id="nd-nombre" placeholder="Ej: Tarjeta Visa"></div>
    <div class="form-group"><label>Saldo total (ARS)</label><input type="number" id="nd-total" placeholder="0" inputmode="numeric"></div>
    <div class="form-group"><label>Tipo</label>
      <select id="nd-tipo"><option>Préstamo</option><option>Tarjeta de crédito</option><option>Otro</option></select>
    </div>
    <button class="btn-primary" onclick="addDeuda()">Agregar deuda</button>
    <button class="btn-cancel" onclick="closeModal('modal-deuda')">Cancelar</button>
    <div class="safe-bottom"></div>
  </div>
</div>

const allMeses=['2025-10','2025-11','2025-12','2026-01','2026-02','2026-03','2026-04'];

loadData();

function fmt(n){return'$'+Math.round(n).toLocaleString('es-AR')}
function getMes(idx){return allMeses[idx]}
function gastosDelMes(mes){return gastos.filter(g=>g.Mes===mes)}

function showPage(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  el.classList.add('active');
  document.getElementById('fab').style.display=name==='deudas'?'none':'flex';
}

function toggleEdit(){
  const el=document.getElementById('ingreso-edit');
  const showing=el.classList.contains('show');
  el.classList.toggle('show',!showing);
  if(!showing){document.getElementById('inp-ingreso').value=ingresos[getMes(curMesIdx)]||'';document.getElementById('inp-ingreso').focus();}
}
function guardarIngreso(){
  const val=parseFloat(document.getElementById('inp-ingreso').value);
  if(!val||isNaN(val)){alert('Ingresá un monto válido');return}
  ingresos[getMes(curMesIdx)]=val;
  document.getElementById('ingreso-edit').classList.remove('show');
  saveData();
  renderResumen();
}

function renderResumen(){
  const mes=getMes(curMesIdx);
  document.getElementById('mes-label').textContent=MESES_LABELS[mes]||mes;
  const g=gastosDelMes(mes);
  const total=g.reduce((s,x)=>s+x.Monto,0);
  const ingreso=ingresos[mes]||null;
  const balance=ingreso!=null?ingreso-total:null;
  document.getElementById('header-sub').textContent=ingreso?'Ingreso: '+fmt(ingreso):'';
  document.getElementById('ingreso-val').textContent=ingreso?fmt(ingreso):'—';
  document.getElementById('ingreso-val').style.color=ingreso?'#1d7a4f':'#6d6d72';
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Gastos del mes</div><div class="metric-value danger">${fmt(total)}</div></div>
    <div class="metric"><div class="metric-label">Balance</div><div class="metric-value ${balance==null?'':balance>=0?'success':'danger'}">${balance!=null?fmt(balance):'—'}</div></div>
    <div class="metric"><div class="metric-label">Transacciones</div><div class="metric-value">${g.length}</div></div>
    <div class="metric"><div class="metric-label">Promedio diario</div><div class="metric-value">${fmt(total/30)}</div></div>
  `;
  const bycat={};
  g.forEach(x=>{bycat[x.Categoria]=(bycat[x.Categoria]||0)+x.Monto});
  const sorted=Object.entries(bycat).sort((a,b)=>b[1]-a[1]);
  const max=sorted[0]?sorted[0][1]:1;
  document.getElementById('cat-bars').innerHTML=sorted.map(([cat,amt])=>`
    <div class="cat-row">
      <div class="cat-label">${cat}</div>
      <div class="cat-bar-wrap"><div class="cat-bar" style="width:${Math.round(amt/max*100)}%;background:${CAT_COLORS[cat]||'#888'}"></div></div>
      <div class="cat-amount">${fmt(amt)}</div>
    </div>`).join('');
  renderChart();
}

  const totals=allMeses.map(m=>gastosDelMes(m).reduce((s,x)=>s+x.Monto,0));
  const ingrArr=allMeses.map(m=>ingresos[m]||null);
  const hasIngr=ingrArr.some(v=>v!==null);
  if(chartInstance)chartInstance.destroy();
  const datasets=[{label:'Gastos',data:totals,backgroundColor:allMeses.map((m,i)=>i===curMesIdx?'#3266ad':'#b5d4f4'),borderRadius:4,order:2}];
  if(hasIngr)datasets.push({label:'Ingresos',data:ingrArr,type:'line',borderColor:'#27ae60',borderWidth:2,pointRadius:4,pointBackgroundColor:'#27ae60',fill:false,spanGaps:true,order:1});
  chartInstance=new Chart(document.getElementById('chartMes'),{
    type:'bar',data:{labels:allMeses.map(m=>MESES_LABELS[m]||m),datasets},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{y:{ticks:{callback:v=>'$'+(v/1000000).toFixed(1)+'M',font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}},x:{ticks:{font:{size:9},maxRotation:30,autoSkip:false},grid:{display:false}}}}
  });
}

function prevMes(){if(curMesIdx>0){curMesIdx--;renderResumen()}}
function nextMes(){if(curMesIdx<allMeses.length-1){curMesIdx++;renderResumen()}}
function prevMes2(){if(curMesIdx2>0){curMesIdx2--;renderGastos()}}
function nextMes2(){if(curMesIdx2<allMeses.length-1){curMesIdx2++;renderGastos()}}

function renderGastos(){
  const mes=getMes(curMesIdx2);
  document.getElementById('mes-label2').textContent=MESES_LABELS[mes]||mes;
  const g=gastosDelMes(mes);
  const cats=[...new Set(g.map(x=>x.Categoria))];
  document.getElementById('filtro-cat').innerHTML=`
    <span style="font-size:11px;padding:4px 10px;border-radius:12px;cursor:pointer;border:0.5px solid ${!filterCat?'#3266ad':'rgba(0,0,0,.15)'};color:${!filterCat?'#3266ad':'#6d6d72'};background:${!filterCat?'#e6f1fb':'#fff'}" onclick="filterCat=null;renderGastos()">Todos</span>
    ${cats.map(c=>`<span style="font-size:11px;padding:4px 10px;border-radius:12px;cursor:pointer;border:0.5px solid ${filterCat===c?(CAT_COLORS[c]||'#888'):'rgba(0,0,0,.15)'};color:${filterCat===c?(CAT_COLORS[c]||'#888'):'#6d6d72'};background:#fff" onclick="filterCat='${c}';renderGastos()">${c}</span>`).join('')}
  `;
  const filtered=filterCat?g.filter(x=>x.Categoria===filterCat):g;
  const sorted=[...filtered].sort((a,b)=>b.Fecha.localeCompare(a.Fecha));
  document.getElementById('expense-list').innerHTML=sorted.length===0
    ?'<p style="color:#6d6d72;font-size:13px;text-align:center;padding:20px">Sin gastos este mes</p>'
    :sorted.map(x=>`<div class="expense-item">
      <div class="exp-icon" style="background:${CAT_COLORS[x.Categoria]||'#888'}22">${CAT_ICONS[x.Categoria]||'📌'}</div>
      <div class="exp-info"><div class="exp-name">${x.Nombre}</div><div class="exp-cat">${x.Categoria}</div></div>
      <div style="text-align:right"><div class="exp-amount">${fmt(x.Monto)}</div><div class="exp-date">${x.Fecha.slice(8,10)}/${x.Fecha.slice(5,7)}</div></div>
    </div>`).join('');
}

function renderDeudas(){
  const totalSaldo=deudas.reduce((s,d)=>s+d.saldo,0);
  const totalPagado=deudas.reduce((s,d)=>s+(d.totalOriginal-d.saldo),0);
  document.getElementById('deudas-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Saldo total</div><div class="metric-value danger">${fmt(totalSaldo)}</div></div>
    <div class="metric"><div class="metric-label">Total pagado</div><div class="metric-value success">${fmt(totalPagado)}</div></div>
  `;
  document.getElementById('deudas-list').innerHTML=deudas.map(d=>{
    const pagado=d.totalOriginal-d.saldo;
    const pct=Math.round(pagado/d.totalOriginal*100);
    const terminado=d.saldo<=0;
    return`<div class="deuda-card">
      <div class="deuda-header">
        <div class="deuda-nombre">${d.n}</div>
        <span class="badge ${terminado?'badge-ok':'badge-pend'}">${terminado?'Pagado':d.tipo}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#6d6d72;margin-bottom:4px">
        <span>${pct}% pagado</span><span>${fmt(pagado)} de ${fmt(d.totalOriginal)}</span>
      </div>
      <div class="deuda-progress-bar"><div class="deuda-progress-fill" style="width:${pct}%;background:${terminado?'#1d7a4f':'#3266ad'}"></div></div>
      <div class="deuda-nums">
        <div class="deuda-num"><div class="deuda-num-label">Total original</div><div class="deuda-num-val">${fmt(d.totalOriginal)}</div></div>
        <div class="deuda-num"><div class="deuda-num-label">Ya pagado</div><div class="deuda-num-val g">${fmt(pagado)}</div></div>
        <div class="deuda-num"><div class="deuda-num-label">Saldo restante</div><div class="deuda-num-val r">${fmt(Math.max(d.saldo,0))}</div></div>
      </div>
      ${!terminado?`<div class="pago-row">
        <input type="number" id="pago-${d.id}" placeholder="Monto a pagar" inputmode="numeric">
        <button onclick="registrarPago(${d.id})">Pagar</button>
      </div>`:''}
    </div>`;
  }).join('');
}

function registrarPago(id){
  const input=document.getElementById('pago-'+id);
  const monto=parseFloat(input.value);
  if(!monto||isNaN(monto)||monto<=0){alert('Ingresá un monto válido');return}
  const d=deudas.find(x=>x.id===id);
  if(!d)return;
  d.saldo=Math.max(0,d.saldo-monto);
  input.value='';
  saveData();
  syncSheet({tipo:'pago_deuda',nombre:d.n,monto});
  mostrarSyncStatus('✓ Pago registrado en Sheets');
  renderDeudas();
}

function renderFondo(){
  const total=fondo.reduce((s,f)=>s+f.monto,0);
  document.getElementById('fondo-total').textContent=fmt(total);
  const max=Math.max(...fondo.map(f=>Math.abs(f.monto)));
  document.getElementById('fondo-list').innerHTML=fondo.map(f=>`
    <div style="padding:10px 0;border-bottom:0.5px solid rgba(0,0,0,.08)">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:13px;color:#1c1c1e">${f.mes}</span>
        <span style="font-size:13px;font-weight:600;color:${f.monto>=0?'#1d7a4f':'#c0392b'}">${fmt(f.monto)}</span>
      </div>
      <div class="fondo-bar"><div class="fondo-fill" style="width:${Math.round(Math.abs(f.monto)/max*100)}%;background:${f.monto>=0?'#3266ad':'#c0392b'}"></div></div>
    </div>`).join('');
}

function openDeudaModal(){document.getElementById('modal-deuda').classList.add('open')}
function openGastoModal(){
  document.getElementById('inp-fecha').value=new Date().toISOString().slice(0,10);
  document.getElementById('modal-gasto').classList.add('open');
}
function closeModal(id){document.getElementById(id).classList.remove('open')}

function addDeuda(){
  const nombre=document.getElementById('nd-nombre').value.trim();
  const total=parseFloat(document.getElementById('nd-total').value);
  const tipo=document.getElementById('nd-tipo').value;
  if(!nombre||!total){alert('Completá todos los campos');return}
  deudas.push({id:nextId++,n:nombre,tipo,totalOriginal:total,saldo:total});
  document.getElementById('nd-nombre').value='';
  document.getElementById('nd-total').value='';
  closeModal('modal-deuda');
  saveData();
  renderDeudas();
}

function addGasto(){
  const nombre=document.getElementById('inp-nombre').value.trim();
  const monto=parseFloat(document.getElementById('inp-monto').value);
  const fecha=document.getElementById('inp-fecha').value;
  const cat=document.getElementById('inp-cat').value;
  if(!nombre||!monto||!fecha){alert('Completá todos los campos');return}
  const mes=fecha.slice(0,7);
  if(!allMeses.includes(mes)){allMeses.push(mes);MESES_LABELS[mes]=mes}
  const nuevoGasto={Fecha:fecha,Nombre:nombre,Monto:monto,Categoria:cat,Mes:mes};
  gastos.push(nuevoGasto);
  closeModal('modal-gasto');
  document.getElementById('inp-nombre').value='';
  document.getElementById('inp-monto').value='';
  curMesIdx=allMeses.indexOf(mes);curMesIdx2=allMeses.indexOf(mes);
  saveData();
  syncSheet({tipo:'gasto',id:Date.now(),fecha,nombre,monto,categoria:cat});
  mostrarSyncStatus('✓ Gasto guardado en Sheets');
  renderResumen();renderGastos();
}

// ── Google Sheets Sync ──
const SHEET_URL='https://script.google.com/macros/s/AKfycbxp1a0D9--M-iJ8_UTQf2eoBhCZI7lSFFw3sBx1VtFt5ZqBZjGCEMEGn6liePC5tNur9w/exec';

function syncSheet(payload){
  const params=new URLSearchParams(payload);
  fetch(SHEET_URL+'?'+params.toString(),{method:'GET',mode:'no-cors'}).catch(()=>{});
}

function mostrarSyncStatus(msg,ok=true){
  let el=document.getElementById('sync-status');
  if(!el){
    el=document.createElement('div');
    el.id='sync-status';
    el.style.cssText='position:fixed;bottom:155px;left:50%;transform:translateX(-50%);background:'+(ok?'#1d7a4f':'#c0392b')+';color:#fff;font-size:12px;padding:6px 16px;border-radius:20px;z-index:99;opacity:1;transition:opacity 1.5s';
    document.body.appendChild(el);
  }
  el.style.background=ok?'#1d7a4f':'#c0392b';
  el.textContent=msg;
  el.style.opacity='1';
  setTimeout(()=>{el.style.opacity='0'},2500);
}

// Service Worker para PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

renderResumen();renderGastos();renderDeudas();renderFondo();
</script>
